    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <title>Merriott Social Venue</title>
    <script type="text/javascript">
      (function(l) {
        if (l.pathname.indexOf('/merriott-social-venue') !== -1 && l.pathname.length > 22 && !l.hash) {
          var path = l.pathname.split('/merriott-social-venue')[1];
          if (path && path !== '/') {
            window.location.replace('/merriott-social-venue/#' + path);
          }
        }
      }(window.location))
    </script>
